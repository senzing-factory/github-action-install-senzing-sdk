name: Test install scripts

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-unit:
    name: "Unit: install dispatch (bats)"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run bats tests
        run: bats tests/

  test-linux:
    name: "Linux: ${{ matrix.senzingsdk-version }}"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        senzingsdk-version: [production-v4, staging-v4, "4.2.1"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run install script
        env:
          PACKAGES_TO_INSTALL: senzingsdk-runtime
          SENZING_ACCEPT_EULA: I_ACCEPT_THE_SENZING_EULA
          SENZING_INSTALL_VERSION: ${{ matrix.senzingsdk-version }}
        run: bash linux/install-senzing.sh

  test-macos:
    name: "macOS: ${{ matrix.senzingsdk-version }} (${{ matrix.darwin-installer || 'auto' }})"
    permissions:
      contents: read
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Auto-detect coverage. Floating tags now default to homebrew;
          # pre-4.3.0 pinned still defaults to native. The staging tap
          # is private and requires a short-lived GitHub App token
          # (see `Mint staging tap token` step below).
          - senzingsdk-version: production-v4
          - senzingsdk-version: staging-v4
            needs-staging-token: true
          - senzingsdk-version: "4.2.1"
          # Explicit overrides — exercise the opt-out and warn+fallback
          # paths so the auto-detect doesn't hide regressions.
          - senzingsdk-version: production-v4
            darwin-installer: native
          - senzingsdk-version: "4.2.1"
            darwin-installer: homebrew

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Mint staging tap token
        # Attempt the mint unconditionally for staging-token rows.
        # `continue-on-error` only swallows failure on fork PRs where
        # org secrets aren't available; for internal runs (main push,
        # internal PRs, workflow_dispatch) a missing secret is a real
        # misconfig and should fail loudly.
        if: ${{ matrix.needs-staging-token }}
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          # `app-id` accepts either a numeric App ID or a Client ID;
          # Client ID is GitHub's preferred forward-looking identifier.
          client-id: ${{ secrets.SENZINGSDK_STAGING_CLIENT_ID }}
          private-key: ${{ secrets.SENZINGSDK_STAGING_APP_KEY }}
          owner: senzing-factory
          repositories: homebrew-senzingsdk-staging
        continue-on-error: ${{ github.event.pull_request.head.repo.fork == true }}

      - name: Warn when token unavailable (fork PR)
        if: ${{ matrix.needs-staging-token && steps.app-token.outcome != 'success' && github.event.pull_request.head.repo.fork == true }}
        run: echo "::warning::staging tap token unavailable for fork PR; skipping homebrew staging install"

      - name: Run install script
        if: ${{ !matrix.needs-staging-token || steps.app-token.outcome == 'success' }}
        env:
          SENZING_INSTALL_VERSION: ${{ matrix.senzingsdk-version }}
          DARWIN_INSTALLER: ${{ matrix.darwin-installer }}
          SENZINGSDK_TOKEN: ${{ steps.app-token.outputs.token }}
        run: bash darwin/install-senzing.sh

  test-windows:
    name: "Windows: ${{ matrix.senzingsdk-version }} (${{ matrix.windows-installer || 'auto' }})"
    permissions:
      contents: read
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Required-by-branch-protection: floating-tag installs via
          # the public prod bucket and the private staging bucket.
          # Job names must remain `Windows: <version> (scoop)`.
          - senzingsdk-version: production-v4
            windows-installer: scoop
          - senzingsdk-version: staging-v4
            windows-installer: scoop
            needs-staging-token: true
          # Pre-4.3.0 auto-detect goes to native; auto-detect of
          # floating tags is covered by the bats unit tests.
          - senzingsdk-version: "4.2.1"
          # Explicit overrides — opt-out and warn+fallback paths.
          - senzingsdk-version: production-v4
            windows-installer: native
          - senzingsdk-version: "4.2.1"
            windows-installer: scoop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Mint staging bucket token
        # See macOS job above: continue-on-error only soft-fails on
        # fork PRs (no secret access). Internal runs that hit a missing
        # secret fail loudly so misconfig is caught.
        if: ${{ matrix.needs-staging-token }}
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          # `app-id` accepts either a numeric App ID or a Client ID;
          # Client ID is GitHub's preferred forward-looking identifier.
          client-id: ${{ secrets.SENZINGSDK_STAGING_CLIENT_ID }}
          private-key: ${{ secrets.SENZINGSDK_STAGING_APP_KEY }}
          owner: senzing-factory
          repositories: scoop-senzingsdk-staging
        continue-on-error: ${{ github.event.pull_request.head.repo.fork == true }}

      - name: Warn when token unavailable (fork PR)
        if: ${{ matrix.needs-staging-token && steps.app-token.outcome != 'success' && github.event.pull_request.head.repo.fork == true }}
        run: echo "::warning::staging bucket token unavailable for fork PR; skipping scoop staging install"

      - name: Run install script
        if: ${{ !matrix.needs-staging-token || steps.app-token.outcome == 'success' }}
        env:
          SENZING_INSTALL_VERSION: ${{ matrix.senzingsdk-version }}
          WINDOWS_INSTALLER: ${{ matrix.windows-installer }}
          SENZINGSDK_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: bash windows/install-senzing.sh
