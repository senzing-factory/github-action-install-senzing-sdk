name: Install Senzing SDK
description: Install Senzing SDK based on platform.
author: support@senzing.com

inputs:
  packages-to-install:
    description: Space separated list of Senzing packages to install. Linux only.
    default: "senzingsdk-runtime"
  senzingsdk-version:
    description: Version of Senzing SDK to install
    default: "production-v3"

runs:
  using: composite
  steps:
    - if: runner.os == 'Linux'
      name: Run on Linux
      uses: senzing-factory/github-action-install-senzing-sdk/linux@1-skern
      with:
        senzingsdk-version: ${{ inputs.senzingsdk-version }}
        packages-to-install: ${{ inputs.packages-to-install }}

    - if: runner.os == 'macOS'
      name: Run on macOS
      uses: senzing-factory/github-action-install-senzing-sdk/darwin@1-skern
      with:
        senzingsdk-version: ${{ inputs.senzingsdk-version }}

    - if: runner.os == 'Windows'
      name: Run on Windows
      uses: senzing-factory/github-action-install-senzing-sdk/windows@1-skern
      with:
        senzingsdk-version: ${{ inputs.senzingsdk-version }}

branding:
  icon: download
  color: green
