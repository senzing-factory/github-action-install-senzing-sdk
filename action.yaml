name: Install Senzing SDK
description: Install Senzing SDK based on platform.
author: support@senzing.com

inputs:
  packages-to-install:
    description: Space separated list of Senzing packages to install. Linux only.
    default: "senzingsdk-runtime"
  senzingsdk-repository:
    description: Used for semantic version installs only, staging or production.
  senzingsdk-repository-package:
    description: Optional repository package override for senzing packages outside of staging and production. Linux only.
  senzingsdk-repository-path:
    description: Optional repository override for senzing packages outside of staging and production. Requires senzingsdk-version.
  senzingsdk-version:
    description: Version of Senzing SDK to install
    required: true
  darwin-installer:
    description: "macOS only. Install via Homebrew tap (`homebrew`) or the native hdiutil/cp flow (`native`). Leave empty to auto-detect by version (homebrew for pinned SDK >= 4.3.0 and floating tags; native for pre-4.3.0 pinned versions)."
  windows-installer:
    description: "Windows only. Install via Scoop bucket (`scoop`) or the native zip/extract flow (`native`). Leave empty to auto-detect by version (scoop for pinned SDK >= 4.3.0 and floating tags; native for pre-4.3.0 pinned versions)."
  senzingsdk-token:
    description: "macOS and Windows. GitHub token used to clone the private staging Homebrew tap (macOS) or Scoop bucket (Windows). Defaults to the calling workflow's github.token."
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - if: runner.os == 'Linux'
      name: Run on Linux
      uses: senzing-factory/github-action-install-senzing-sdk/linux@v5
      with:
        packages-to-install: ${{ inputs.packages-to-install }}
        senzingsdk-repository: ${{ inputs.senzingsdk-repository }}
        senzingsdk-repository-package: ${{ inputs.senzingsdk-repository-package }}
        senzingsdk-repository-path: ${{ inputs.senzingsdk-repository-path }}
        senzingsdk-version: ${{ inputs.senzingsdk-version }}

    - if: runner.os == 'macOS'
      name: Run on macOS
      uses: senzing-factory/github-action-install-senzing-sdk/darwin@v5
      with:
        senzingsdk-repository: ${{ inputs.senzingsdk-repository }}
        senzingsdk-repository-path: ${{ inputs.senzingsdk-repository-path }}
        senzingsdk-version: ${{ inputs.senzingsdk-version }}
        darwin-installer: ${{ inputs.darwin-installer }}
        senzingsdk-token: ${{ inputs.senzingsdk-token }}

    - if: runner.os == 'Windows'
      name: Run on Windows
      uses: senzing-factory/github-action-install-senzing-sdk/windows@v5
      with:
        senzingsdk-repository: ${{ inputs.senzingsdk-repository }}
        senzingsdk-repository-path: ${{ inputs.senzingsdk-repository-path }}
        senzingsdk-version: ${{ inputs.senzingsdk-version }}
        windows-installer: ${{ inputs.windows-installer }}
        senzingsdk-token: ${{ inputs.senzingsdk-token }}

branding:
  icon: download
  color: green
